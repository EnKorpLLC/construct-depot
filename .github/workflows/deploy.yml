name: Deploy to Production
on:
  push:
    branches: [ main ]

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify Prisma setup
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing prisma directory:"
          ls -la prisma/
          echo "Checking schema path:"
          test -f prisma/schema.prisma && echo "Schema found" || echo "Schema not found"
          echo "DATABASE_URL format check:"
          echo $DATABASE_URL | sed 's/:[^:]*@/:***@/' || true
      
      - name: Test database connection
        run: |
          npx prisma db pull --schema=./prisma/schema.prisma || (
            echo "Database connection failed"
            exit 1
          )
      
      - name: Generate Prisma Client
        run: |
          npx prisma generate --schema=./prisma/schema.prisma
      
      - name: Build project
        run: npm run build
      
      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --token=${{ env.VERCEL_TOKEN }} --yes