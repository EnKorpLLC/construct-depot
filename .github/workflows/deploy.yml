name: Deploy to Production
on:
  push:
    branches: [ main ]

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
  REDIS_URL: ${{ secrets.REDIS_URL }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
  NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
  STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
  ENABLE_ANALYTICS: true
  ENABLE_CRAWLER: true
  ENABLE_NOTIFICATIONS: true
  NODE_ENV: production

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify environment
        run: |
          echo "Checking required environment variables..."
          missing_vars=()
          for var in DATABASE_URL NEXTAUTH_URL NEXTAUTH_SECRET REDIS_URL NEXT_PUBLIC_API_URL NEXT_PUBLIC_APP_URL STORAGE_BUCKET VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!var}" ]; then
              missing_vars+=("$var")
            fi
          done
          if [ ${#missing_vars[@]} -ne 0 ]; then
            echo "Missing required environment variables:"
            printf '%s\n' "${missing_vars[@]}"
            exit 1
          fi
          echo "All required environment variables are set"
      
      - name: Verify Prisma setup
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing prisma directory:"
          ls -la prisma/
          echo "Checking schema path:"
          test -f prisma/schema.prisma && echo "Schema found" || echo "Schema not found"
          echo "DATABASE_URL format check:"
          echo $DATABASE_URL | sed 's/:[^:]*@/:***@/' || true
      
      - name: Test database connection
        run: |
          npx prisma db pull --schema=./prisma/schema.prisma || (
            echo "Database connection failed"
            exit 1
          )
      
      - name: Generate Prisma Client
        run: |
          npx prisma generate --schema=./prisma/schema.prisma
      
      - name: Build project
        run: npm run build
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend