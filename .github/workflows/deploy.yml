name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  actions: write
  checks: write
  issues: write
  packages: write
  pull-requests: write
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate Required Secrets
        shell: bash
        run: |
          missing_secrets=()
          
          # Check core secrets
          [ -z "${{ secrets.DATABASE_URL }}" ] && missing_secrets+=("DATABASE_URL")
          [ -z "${{ secrets.NEXTAUTH_URL }}" ] && missing_secrets+=("NEXTAUTH_URL")
          [ -z "${{ secrets.NEXTAUTH_SECRET }}" ] && missing_secrets+=("NEXTAUTH_SECRET")
          [ -z "${{ secrets.REDIS_URL }}" ] && missing_secrets+=("REDIS_URL")
          
          # Check Vercel deployment secrets
          [ -z "${{ secrets.VERCEL_TOKEN }}" ] && missing_secrets+=("VERCEL_TOKEN")
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ] && missing_secrets+=("VERCEL_ORG_ID")
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && missing_secrets+=("VERCEL_PROJECT_ID")
          
          if [ ${#missing_secrets[@]} -ne 0 ]; then
            echo "❌ Missing required secrets:"
            printf '%s\n' "${missing_secrets[@]}"
            exit 1
          fi
          
          echo "✅ All required secrets are present"

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    
    steps:
      - name: Debug Environment Variables
        run: |
          echo "DATABASE_URL is set: [${{ env.DATABASE_URL }}]"
          echo "NEXTAUTH_URL is set: [${{ env.NEXTAUTH_URL }}]"
          echo "NEXTAUTH_SECRET is set: [${{ env.NEXTAUTH_SECRET }}]"
          echo "REDIS_URL is set: [${{ env.REDIS_URL }}]"
          echo "VERCEL_TOKEN is set: [${{ env.VERCEL_TOKEN }}]"
          echo "VERCEL_ORG_ID is set: [${{ env.VERCEL_ORG_ID }}]"
          echo "VERCEL_PROJECT_ID is set: [${{ env.VERCEL_PROJECT_ID }}]"
          # Note: The above echo statements are for debugging purposes and should not expose actual secret values in a real-world scenario.

      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Debug Info
        shell: bash
        run: |
          echo "Current directory: $(pwd)"
          echo "Git status:"
          git status
          echo "Git remote:"
          git remote -v
          echo "List files:"
          ls -la
          echo "Node version:"
          node -v
          echo "NPM version:"
          npm -v
          
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        shell: bash
        working-directory: ./frontend
        run: |
          npm install -g npm@latest
          npm install
          npm install tailwindcss postcss autoprefixer "@types/node" "@types/react" "@types/react-dom"
        
      - name: Set up environment
        shell: bash
        working-directory: ./frontend
        run: |
          {
            echo "NEXTAUTH_URL=${{ env.NEXTAUTH_URL }}"
            echo "NEXTAUTH_SECRET=${{ env.NEXTAUTH_SECRET }}"
            echo "DATABASE_URL=${{ env.DATABASE_URL }}"
            echo "REDIS_URL=${{ env.REDIS_URL }}"
            echo "NODE_ENV=production"
          } > .env.production
        
      - name: Generate Prisma Client
        shell: bash
        working-directory: ./frontend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run database migrations
        shell: bash
        working-directory: ./frontend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        
      - name: Build
        shell: bash
        working-directory: ./frontend
        run: npm run build
        env:
          NEXTAUTH_URL: ${{ env.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ env.NEXTAUTH_SECRET }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          NODE_ENV: production
        
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend