name: Deploy to Production
on:
  push:
    branches: [ main ]

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
  REDIS_URL: ${{ secrets.REDIS_URL }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
  NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
  STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
  ENABLE_ANALYTICS: true
  ENABLE_CRAWLER: true
  ENABLE_NOTIFICATIONS: true
  NODE_ENV: production

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      - name: Install dependencies
        run: |
          echo "Installing npm dependencies..."
          npm ci
          echo "Installing Vercel CLI..."
          npm install -g vercel
          echo "Vercel CLI version:"
          vercel --version
      
      - name: Verify environment
        run: |
          echo "Checking required environment variables..."
          missing_vars=()
          for var in DATABASE_URL NEXTAUTH_URL NEXTAUTH_SECRET REDIS_URL NEXT_PUBLIC_API_URL NEXT_PUBLIC_APP_URL STORAGE_BUCKET VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!var}" ]; then
              missing_vars+=("$var")
            fi
          done
          if [ ${#missing_vars[@]} -ne 0 ]; then
            echo "Missing required environment variables:"
            printf '%s\n' "${missing_vars[@]}"
            exit 1
          fi
          echo "All required environment variables are set"
          echo "VERCEL_ORG_ID length: ${#VERCEL_ORG_ID}"
          echo "VERCEL_PROJECT_ID length: ${#VERCEL_PROJECT_ID}"
          echo "Current directory: $(pwd)"
          echo "Directory contents:"
          ls -la
      
      - name: Setup Prisma
        run: |
          echo "Installing Prisma..."
          npm install prisma --save-dev
          echo "Checking Prisma schema..."
          ls -la prisma/
          echo "Generating Prisma client..."
          npx prisma generate --schema=./prisma/schema.prisma
      
      - name: Link Vercel Project
        run: |
          echo "Attempting to link Vercel project..."
          echo "Current directory: $(pwd)"
          echo "Project configuration:"
          cat vercel.json || echo "vercel.json not found"
          vercel link --token=${{ env.VERCEL_TOKEN }} --yes --debug
      
      - name: Pull Vercel Environment
        run: |
          echo "Pulling Vercel environment..."
          vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }} --debug
      
      - name: Build Project
        run: |
          echo "Starting Vercel build..."
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "Checking Next.js config:"
          cat next.config.js
          vercel build --prod --token=${{ env.VERCEL_TOKEN }} --debug
      
      - name: Deploy to Vercel
        run: |
          echo "Starting Vercel deployment..."
          echo "Build output contents:"
          ls -la .next/ || echo ".next directory not found"
          vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }} --yes --debug