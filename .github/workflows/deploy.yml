name: Deploy to Production
# Trigger deployment on push to main branch
on:
  push:
    branches: [ main ]

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
  REDIS_URL: ${{ secrets.REDIS_URL }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:3000' }}
  NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
  STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET || 'local-storage' }}
  ENABLE_ANALYTICS: true
  ENABLE_CRAWLER: true
  ENABLE_NOTIFICATIONS: true
  NODE_ENV: production

jobs:
  deploy:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      - name: System Info
        run: |
          echo "OS Information:"
          lsb_release -a
          echo "Node Version:"
          node -v
          echo "NPM Version:"
          npm -v
          echo "Current User:"
          whoami
          echo "Current Directory:"
          pwd
      
      - name: Clean install directory
        run: |
          echo "Cleaning npm cache..."
          npm cache clean --force
          echo "Removing existing node_modules..."
          rm -rf node_modules package-lock.json
      
      - name: Install dependencies
        run: |
          echo "Installing npm dependencies..."
          # First try to install react@18.2.0 specifically
          npm install react@18.2.0 react-dom@18.2.0 --save-exact
          # Then install remaining dependencies with legacy peer deps
          npm install --legacy-peer-deps
          echo "Installing Vercel CLI globally..."
          sudo npm install -g vercel
          echo "Vercel CLI version:"
          vercel --version || echo "Vercel CLI not found in PATH"
          echo "Which vercel:"
          which vercel || echo "vercel not found"
          echo "Installed React version:"
          npm list react
      
      - name: Verify environment
        run: |
          echo "Checking required environment variables..."
          missing_vars=()
          # Required variables that must be set
          required_vars=(DATABASE_URL NEXTAUTH_URL NEXTAUTH_SECRET REDIS_URL VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID)
          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              missing_vars+=("$var")
            fi
          done
          
          # Optional variables with defaults
          echo "Optional variables status:"
          echo "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-using default}"
          echo "NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-using default}"
          echo "STORAGE_BUCKET=${STORAGE_BUCKET:-using default}"
          
          if [ ${#missing_vars[@]} -ne 0 ]; then
            echo "Missing required environment variables:"
            printf '%s\n' "${missing_vars[@]}"
            exit 1
          fi
          echo "All required environment variables are set"
          echo "VERCEL_ORG_ID length: ${#VERCEL_ORG_ID}"
          echo "VERCEL_PROJECT_ID length: ${#VERCEL_PROJECT_ID}"
          echo "Current directory: $(pwd)"
          echo "Directory contents:"
          ls -la
      
      - name: Setup Prisma
        run: |
          echo "Installing Prisma..."
          npm install prisma --save-dev
          echo "Checking Prisma schema..."
          ls -la prisma/
          echo "Formatting Prisma schema..."
          npx prisma format
          echo "Validating Prisma schema..."
          npx prisma validate
          echo "Generating Prisma client..."
          npx prisma generate --schema=./prisma/schema.prisma
      
      - name: Link Vercel Project
        run: |
          echo "Attempting to link Vercel project..."
          echo "Current directory: $(pwd)"
          echo "Project configuration:"
          cat vercel.json || echo "vercel.json not found"
          echo "PATH variable:"
          echo $PATH
          export PATH="$PATH:/usr/local/bin"
          vercel link --token=${{ env.VERCEL_TOKEN }} --yes --debug
      
      - name: Pull Vercel Environment
        run: |
          echo "Pulling Vercel environment..."
          export PATH="$PATH:/usr/local/bin"
          vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }} --debug
      
      - name: Build Project
        run: |
          echo "Starting Vercel build..."
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "Checking Next.js config:"
          cat next.config.js
          export PATH="$PATH:/usr/local/bin"
          vercel build --prod --token=${{ env.VERCEL_TOKEN }} --debug
      
      - name: Deploy to Vercel
        run: |
          echo "Starting Vercel deployment..."
          echo "Build output contents:"
          ls -la .next/ || echo ".next directory not found"
          export PATH="$PATH:/usr/local/bin"
          vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }} --yes --debug