name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  actions: write
  checks: write
  issues: write
  packages: write
  pull-requests: write
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate Required Secrets
        shell: bash
        run: |
          missing_secrets=()
          
          # Check core secrets
          [ -z "${{ secrets.DATABASE_URL }}" ] && missing_secrets+=("DATABASE_URL")
          [ -z "${{ secrets.NEXTAUTH_URL }}" ] && missing_secrets+=("NEXTAUTH_URL")
          [ -z "${{ secrets.NEXTAUTH_SECRET }}" ] && missing_secrets+=("NEXTAUTH_SECRET")
          [ -z "${{ secrets.REDIS_URL }}" ] && missing_secrets+=("REDIS_URL")
          
          # Check Vercel deployment secrets
          [ -z "${{ secrets.VERCEL_TOKEN }}" ] && missing_secrets+=("VERCEL_TOKEN")
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ] && missing_secrets+=("VERCEL_ORG_ID")
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && missing_secrets+=("VERCEL_PROJECT_ID")
          
          if [ ${#missing_secrets[@]} -ne 0 ]; then
            echo "❌ Missing required secrets:"
            printf '%s\n' "${missing_secrets[@]}"
            exit 1
          fi
          
          echo "✅ All required secrets are present"

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NODE_ENV: production
      CI: true
      NPM_CONFIG_LEGACY_PEER_DEPS: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Verify Vercel CLI
        run: |
          npm install -g vercel
          vercel --version
          
          # Verify Vercel project access
          echo "Verifying Vercel project access..."
          vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.17.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        shell: bash
        working-directory: ./frontend
        run: |
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          
          # Remove existing modules and lock file
          rm -rf node_modules package-lock.json
          
          # Install dependencies with conservative flags
          npm install --legacy-peer-deps --prefer-offline --no-audit --no-fund --no-optional --loglevel=error
          
          # Install exact versions of dev dependencies
          npm install -D typescript@5.0.4 @types/node@18.16.0 @types/react@18.2.0 @types/react-dom@18.2.0 tailwindcss@3.3.0 postcss@8.4.23 autoprefixer@10.4.14
          
          # Verify core dependencies are installed
          npm list next react react-dom typescript || true
        
      - name: Set up environment
        shell: bash
        working-directory: ./frontend
        run: |
          {
            echo "NEXTAUTH_URL=${{ env.NEXTAUTH_URL }}"
            echo "NEXTAUTH_SECRET=${{ env.NEXTAUTH_SECRET }}"
            echo "DATABASE_URL=${{ env.DATABASE_URL }}"
            echo "REDIS_URL=${{ env.REDIS_URL }}"
            echo "NODE_ENV=production"
          } > .env.production
        
      - name: Generate Prisma Client
        shell: bash
        working-directory: ./frontend
        run: |
          npx prisma generate
          if [ $? -ne 0 ]; then
            echo "Failed to generate Prisma client"
            exit 1
          fi
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run database migrations
        shell: bash
        working-directory: ./frontend
        run: |
          npx prisma migrate deploy
          if [ $? -ne 0 ]; then
            echo "Failed to run database migrations"
            exit 1
          fi
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        
      - name: Build
        shell: bash
        working-directory: ./frontend
        run: |
          npm run build
          if [ $? -ne 0 ]; then
            echo "Build failed"
            exit 1
          fi
        env:
          NEXTAUTH_URL: ${{ env.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ env.NEXTAUTH_SECRET }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          NODE_ENV: production

      - name: Verify Vercel deployment readiness
        shell: bash
        working-directory: ./frontend
        run: |
          echo "Verifying Vercel deployment configuration..."
          
          # Check if .vercel directory exists
          if [ ! -d ".vercel" ]; then
            echo "Creating Vercel project link..."
            vercel link --token=${{ env.VERCEL_TOKEN }} --confirm
          fi
          
          # Verify project settings
          echo "Verifying project settings..."
          vercel inspect --token=${{ env.VERCEL_TOKEN }}
          
          # Check for potential deployment blockers
          echo "Checking for deployment blockers..."
          vercel deploy --prebuilt --token=${{ env.VERCEL_TOKEN }} --yes || exit 1
        
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --debug'
          working-directory: ./frontend